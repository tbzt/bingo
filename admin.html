<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bingo Admin</title>

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body class="admin">

    <header class="admin-header">

        <div class="brand">
            🎱 <span>Bingo Control Room</span>
        </div>

        <div id="status" class="status">Prêt</div>

    </header>

    <main class="admin-layout">

        <!-- LEFT PANEL -->
        <section class="control-panel">

            <div class="card">

                <h2>🎯 Partie</h2>

                <button id="resetBtn" class="btn danger big">
                    🔄 RESET PARTIE
                </button>

            </div>

            <div class="card">

                <h2>📊 Progression</h2>

                <div class="rules-panel">

                    <div class="progress">

                        <div class="step" onclick="setStep('quine')" id="step-quine">
                            <div class="dot"></div>
                            <div class="label">QUINE</div>
                        </div>

                        <div class="line"></div>

                        <div class="step" onclick="setStep('doubleQuine')" id="step-doubleQuine">
                            <div class="dot"></div>
                            <div class="label">DOUBLE</div>
                        </div>

                        <div class="line"></div>

                        <div class="step" onclick="setStep('bingo')" id="step-bingo">
                            <div class="dot"></div>
                            <div class="label">BINGO</div>
                        </div>

                    </div>

                </div>

            </div>

        </section>

        <!-- RIGHT GRID -->
        <section class="grid-panel">

            <div class="card">

                <h2>🎱 Numéros</h2>

                <div id="adminGrid" class="grid"></div>

            </div>

        </section>

    </main>

    <script type="module" src="admin.js"></script>

</body>

</html>
