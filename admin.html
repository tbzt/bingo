<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bingo Admin</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body class="admin">

    <div class="topbar">
        <h1>🎱 Bingo Guru</h1>
        <div id="status" class="status">Prêt</div>
    </div>

    <div class="actions">
        <button id="resetBtn" class="btn danger">REINITIALISATION</button>
    </div>

    <div class="rules-panel">

        <button onclick="setStep('quine')">QUINE</button>

        <button onclick="setStep('doubleQuine')">DOUBLE QUINE</button>

        <button onclick="setStep('bingo')">BINGO</button>

    </div>

    <div class="panel">
        <div id="adminGrid" class="grid"></div>
    </div>

    <script type="module" src="admin.js"></script>
</body>

</html>
