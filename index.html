<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bingo Live</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body class="viewer">

    <header class="header">
        <h1>🎱 Bingo Live</h1>
        <div class="subtitle">Derniers numéros tirés</div>
    </header>

    <main class="container">

        <!-- dernier numéro en grand -->
        <div class="current-box">
            <div class="label">Dernier tirage</div>
            <div id="number" class="big-number">0</div>
        </div>

        <!-- grille historique -->
        <section class="history-section">
            <h2>Historique</h2>
            <div id="historyGrid" class="history-grid"></div>
        </section>

    </main>

    <script type="module" src="index.js"></script>
</body>

</html>
