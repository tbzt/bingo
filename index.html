<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bingo Live</title>

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="viewer.css">
</head>

<body class="viewer">

    <header class="header">
        <h1>🎱 Bingo FCPE</h1>
        <button id="fullscreenBtn" class="fullscreen-btn">
            📺 Plein écran
        </button>
    </header>

    <main class="layout">

        <!-- COLONNE GAUCHE -->

        <section class="board">

            <div class="last3">

                <div class="last-header">
                    3 derniers tirages :
                </div>

                <div id="lastNumbers" class="last-numbers"></div>

            </div>

            <div id="grid" class="bingo-grid"></div>

        </section>

        <!-- COLONNE DROITE -->

        <aside class="sidebar">

            <div class="rules-card">

                <h2>🎯 Règles</h2>

                <div id="rule-quine" class="rule">
                    <div class="rule-title">QUINE</div>
                    <div class="rule-text">
                        Une ligne complète
                    </div>
                    <div class="rule-reward">
                        🎁 Un lot gagné
                    </div>
                </div>

                <div id="rule-doublequine" class="rule">
                    <div class="rule-title">DOUBLE QUINE</div>
                    <div class="rule-text">
                        Deux lignes complètes
                    </div>
                    <div class="rule-reward">
                        🎁 Un lot gagné
                    </div>
                </div>

                <div id="rule-bingo" class="rule">
                    <div class="rule-title">BINGO !</div>
                    <div class="rule-text">
                        Toute la grille complétée
                    </div>
                    <div class="rule-reward">
                        🏆 Gros lot
                    </div>
                </div>

            </div>

        </aside>

    </main>

    <script type="module" src="app.js"></script>
    <div id="drawOverlay" class="draw-overlay hidden">
        <div id="drawBall" class="draw-ball">0</div>
    </div>
</body>

</html>
