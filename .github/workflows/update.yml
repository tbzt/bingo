name: Update Bingo State

on:
  workflow_dispatch:
    inputs:
      number:
        description: "Numéro tiré ou 'reset'"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Init state.json if missing
        run: |
          if [ ! -f state.json ]; then
            echo '{"current":0,"history":[]}' > state.json
          fi

      - name: Update state (reset or number)
        run: |
          NUMBER="${{ inputs.number }}"

          echo "Input: $NUMBER"

          if [ "$NUMBER" = "reset" ]; then
            echo '{"current":0,"history":[]}' > state.json
            echo "Reset effectué"
            exit 0
          fi

          node - <<EOF
          const fs = require('fs');

          const number = Number(process.env.NUMBER);
          const state = JSON.parse(fs.readFileSync('state.json', 'utf8'));

          state.current = number;
          state.history = state.history || [];
          state.history.push(number);

          fs.writeFileSync('state.json', JSON.stringify(state, null, 2));
          EOF
        env:
          NUMBER: ${{ inputs.number }}

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add state.json

          git commit -m "Bingo update: ${{ inputs.number }}" || echo "No changes"

          git push
