name: Update Bingo State

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      number:
        description: "Numéro tiré"
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update state.json
        run: |
          NUMBER="${{ inputs.number }}"

          echo "Updating with number: $NUMBER"

          # Si state.json n'existe pas encore, on le crée
          if [ ! -f state.json ]; then
            echo '{"current":0,"history":[]}' > state.json
          fi

          # Mise à jour du JSON
          node - <<EOF
          const fs = require('fs');

          const number = Number(process.env.NUMBER);

          const state = JSON.parse(fs.readFileSync('state.json', 'utf8'));

          state.current = number;

          if (!state.history) state.history = [];

          state.history.push(number);

          fs.writeFileSync('state.json', JSON.stringify(state, null, 2));
          EOF
        env:
          NUMBER: ${{ inputs.number }}

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add state.json

          git commit -m "Bingo update: ${{ inputs.number }}" || echo "No changes"

          git push
